# Production Profile Configuration
# This file is activated when SPRING_PROFILES_ACTIVE=prod

# ===========================================
# Database Configuration (from environment)
# ===========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ===========================================
# Flyway (Production Settings)
# ===========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ===========================================
# Redis Configuration
# ===========================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ===========================================
# JWT Configuration (from environment)
# ===========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=36000000

# ===========================================
# Logging Configuration
# ===========================================
logging.config=classpath:logback-spring.xml
logging.level.root=INFO
logging.level.com.dean=INFO
logging.level.org.hibernate.SQL=WARN

# Logstash Configuration
logstash.enabled=${LOGSTASH_ENABLED:true}
logstash.host=${LOGSTASH_HOST:logstash}
logstash.port=${LOGSTASH_PORT:5000}

# Log File Path
log.path=/var/log/baby-api
log.file=baby-development-backend

# ===========================================
# Mail Configuration (from environment)
# ===========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000

# ===========================================
# Security - CORS Configuration
# ===========================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://app.your-domain.com}

# ===========================================
# JPA/Hibernate Configuration
# ===========================================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================================
# Server Configuration
# ===========================================
server.port=8085
server.error.include-stacktrace=never
server.error.include-message=always

# ===========================================
# Actuator (Health Check)
# ===========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
